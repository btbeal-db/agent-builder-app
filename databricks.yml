# Databricks Asset Bundles configuration for Agent Sweet
#
# This bundle provisions the deploy Job and App with all resources
# and scopes. The app itself deploys from Git — not from the
# bundle's source_code_path.
#
# Usage:
#   ./deploy.sh --profile MY_PROFILE

bundle:
  name: agent-sweet

sync:
  exclude:
    - frontend/node_modules/
    - node_modules/
    - .venv/
    - __pycache__/
    - .git/
    - demo/

resources:
  jobs:
    deploy_job:
      name: agent-sweet-deploy-${bundle.target}
      tasks:
        - task_key: deploy
          notebook_task:
            notebook_path: backend/deploy_notebook.py
          environment_key: default
      environments:
        - environment_key: default
          spec:
            client: "1"
      max_concurrent_runs: 20
      queue:
        enabled: true

  apps:
    agent_sweet:
      name: agent-sweet-${bundle.target}
      description: "Visual drag-and-drop LangGraph agent builder for Databricks"
      source_code_path: .
      resources:
        - name: deploy-job
          job:
            id: ${resources.jobs.deploy_job.id}
            permission: CAN_MANAGE_RUN
      user_api_scopes:
        - catalog.catalogs:read
        - catalog.schemas:read
        - catalog.tables:read
        - dashboards.genie
        - serving.serving-endpoints
        - sql
        - vectorsearch.vector-search-endpoints
        - vectorsearch.vector-search-indexes

targets:
  dev:
    default: true
    # Workspace is resolved from your Databricks CLI auth config.
    # Run: databricks auth login --host https://your-workspace.cloud.databricks.com
